name: Backfill Substack Archive

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run full archive backfill
        run: node import_substack_backfill.js

      - name: Commit and push changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ht_data.js lss_data.js spacesound_data.js posts/
          if git diff --staged --quiet; then
            echo "No content changes to commit."
            exit 0
          fi
          git commit -m "chore: backfill Substack posts"
          git push
