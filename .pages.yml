# =============================================================
# project.yml — Backyard Thoughts / Voyager
# Manifest completo del progetto: struttura, asset, pagine,
# sezioni, configurazione deploy e note di sviluppo.
# Aggiornato: 2026-06-21
# =============================================================

project:
  name: Backyard Thoughts
  slug: voyager
  owner: Antonio Viscusi
  github: https://github.com/anvi-git/voyager
  live_url: https://anvi-git.github.io/voyager/landing_page.html
  type: static-site
  stack:
    frontend:
      - HTML5
      - CSS3
      - Vanilla JavaScript
    backend:
      - Python
      - SQLite3
    tooling:
      - GitHub Actions
      - GitHub Pages
      - Pages CMS (.pages.yml)
  description: >
    Sito personale/editoriale di Antonio Viscusi.
    Include sezioni su cosmologia, large-scale structure,
    high-energy astrophysics, spazio-suono, blog e portfolio.

# -------------------------------------------------------------
# STRUTTURA FILE
# -------------------------------------------------------------

