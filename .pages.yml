  # Cartelle
  directories:

    - path: animations/
      description: File di animazioni CSS/JS
      file_count: ~4

    - path: backend/
      description: >-
        Backend Python. Contiene script server-side,
        eventualmente Flask/FastAPI o script di processing.
      file_count: ~5
      stack: Python
      notes: .sqlite3 escluso da git

    - path: fonts/
      description: Font locali (web fonts self-hosted)
      file_count: ~7

    - path: images/
      description: Immagini statiche del sito (jpg, png, webp)
      file_count: ~9

    - path: svg_images/
      description: Illustrazioni e icone SVG
      file_count: ~12

    - path: favicon_io/
      description: Favicon e icone app (generati da favicon.io)
      file_count: ~6

    - path: posts/
      description: Post in formato file (HTML o Markdown)
      file_count: ~8

    - path: .venv/
      description: Ambiente virtuale Python (escluso da git)
      status: excluded

# -------------------------------------------------------------
# CONFIGURAZIONE GIT
# -------------------------------------------------------------

git:
  repository: https://github.com/anvi-git/voyager
  default_branch: main
  gitignore:
    - .DS_Store
    - "*.sqlite3"
    - "*.ipynb_checkpoints/"
    - __pycache__/
    - .vscode/
    - .venv/
  gitattributes:
    - path: "*"
      setting: text=auto

# -------------------------------------------------------------
# DEPLOY & CI/CD
# -------------------------------------------------------------

deploy:
  provider: GitHub Pages
  method: GitHub Actions
  workflow: .github/workflows/deploy.yml
  trigger:
    - push to main
    - workflow_dispatch
  entry_point: landing_page.html
  production_url: https://anvi-git.github.io/voyager/landing_page.html

cms:
  provider: Pages CMS
  config: .pages.yml
  media_folder: media
  collections:
    - name: pages
      label: Pages
      type: collection
      path: docs
      fields:
        - name: title
          type: string
        - name: body
          type: rich-text

# -------------------------------------------------------------
# SEZIONI EDITORIALI DEL SITO
# -------------------------------------------------------------

sections:
  - id: lss
    name: Large-Scale Structure
    abbreviation: LSS
    files:
      list: lss.html
      article: lss_article.html
      data: lss_data.js
    topics:
      - Power spectrum
      - Galaxy clustering
      - Baryon acoustic oscillations
      - Redshift space distortions

  - id: ht
    name: High-Energy Astrophysics
    abbreviation: HT
    files:
      list: ht.html
      article: ht_article.html
      data: ht_data.js
    topics:
      - X-ray astronomy
      - Gamma-ray bursts
      - Neutron stars
      - Active galactic nuclei

  - id: sp
    name: Space & Planets
    abbreviation: SP
    files:
      list: sp.html
      article: spacesound_article.html
      data: spacesound_data.js
    topics:
      - Planetary science
      - Space sonification
      - Exoplanets

  - id: blog
    name: Blog
    files:
      list: blog.html
      article: blog_article.html
      data: blog_data.js
    topics:
      - Cosmology outreach
      - Research notes
      - Personal essays

# -------------------------------------------------------------
# NOTE DI SVILUPPO
# -------------------------------------------------------------

notes:
  tech_debt:
    - item: >-
        post_content_data.js è 719KB — considerare migrazione
        a JSON separati per sezione o a un backend API.
      priority: medium

    - item: >-
        old_style.css (47KB) è deprecato ma ancora presente.
        Può essere rimosso in sicurezza dopo verifica.
      priority: low

    - item: >-
        I dati dei contenuti sono inline come oggetti JS.
        Una migrazione a Markdown + front matter migliorerebbe
        la manutenibilità e l'integrazione con Pages CMS.
      priority: medium

  ideas:
    - Aggiungere search full-text lato client (Fuse.js o FlexSearch)
    - Integrare MathJax/KaTeX per rendering LaTeX negli articoli
    - RSS feed generato staticamente
    - Dark mode toggle nel header
    - Pagina dedicata al progetto 3x2pt / cosmological pipeline
