        last_modified: "2026-06-20"

      - file: ht.html
        size_kb: 12
        description: Sezione High-Energy Astrophysics
        last_modified: "2026-06-20"

      - file: ht_article.html
        size_kb: 15
        description: Template articolo High-Energy
        last_modified: "2026-06-20"

      - file: sp.html
        size_kb: 10
