</head>
<body>
    <header>
      <div id="title-container">
        <a href="index.html" id="site-initials" aria-label="Backyard Thoughts home">BT</a>
        <h1 id="site-title">
          <a href="index.html" id="site-title-link" aria-label="Backyard Thoughts"><span class="site-title-full">BACKYARD THOUGHTS</span><span class="site-title-short" aria-hidden="true">BT</span></a>
        </h1>
        <a href="landing_page.html" id="menu-trigger" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </a>
      </div>
      <div class="banner">
        <section id="ht">
          <h2><a href="ht_true.html">heralding time</a></h2>
        </section>
        <section id="lss">
          <h2><a href="lss_true.html">last scattering surface</a></h2>
        </section>
        <section id="spso">
          <h2><a href="spacesound_true.html">space of sound</a></h2>
        </section>
        <section id="blog">
          <h2><a href="blog.html">the blog</a></h2>
        </section>
        <section id="about">
          <h2><a href="about.html">about</a></h2>
        </section>
      </div>
    </header>
    <main id="blog-page">
        <h2></h2>
        <div id="blog-layout">
            <section id="blog-articles"></section>
            <aside id="blog-sidebar">
                <section>
                    <h2>read also...</h2>
                    <ul class="blog-sidebar-list" id="suggestions-list"></ul>
                </section>
                <section>
                    <h2>links</h2>
                    <ul class="blog-sidebar-list icon-row">
                        <li><button class="header-button" onclick="window.open('https://github.com/anvi-git', '_blank')"><img src="svg_images/github-icon.png" alt="GitHub" class="png-icon"></button></li>
                        <li><button class="header-button" onclick="window.open('https://substack.com/@anvianvi', '_blank')"><img src="svg_images/substack-icon.png" alt="Substack" class="png-icon"></button></li>
                        <li><button class="header-button" onclick="window.open('https://bsky.app/profile/anvi.bsky.social', '_blank')"><img src="svg_images/Bluesky_Logo.svg" alt="Bluesky" class="png-icon"></button></li>
                      </ul>
                </section>
            </aside>
        </div>
        <script>
          document.addEventListener('DOMContentLoaded', () => {
            const articlesContainer = document.getElementById('blog-articles');
            const suggestions = document.getElementById('suggestions-list');
            const articles = window.BLOG_ARTICLES || {};

            const ids = Object.keys(articles).sort((a, b) => {
              const da = new Date(articles[a].date || 0);
              const db = new Date(articles[b].date || 0);
              return db - da;
            });

            if (!ids.length) {
              if (articlesContainer) {
                articlesContainer.innerHTML = '<p>No posts yet.</p>';
              }
              return;
            }

            if (articlesContainer) {
              ids.forEach(id => {
                const article = articles[id] || {};
                const card = document.createElement('article');
                card.className = 'publication-small-card';
                card.innerHTML = `
                  <div class="publication-small-content">
                    <h3 class="publication-small-title"><a href="blog_article.html?id=${id}">${article.title || ''}</a></h3>
                    <p class="publication-small-excerpt">${article.excerpt || ''}</p>
                    <p class="publication-featured-date">${article.date || ''}</p>
                  </div>
                `;
                articlesContainer.appendChild(card);
              });
            }

            if (suggestions) {
              ids.slice(1, 4).forEach(id => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `blog_article.html?id=${id}`;
                a.textContent = articles[id].title || 'Untitled';
                li.appendChild(a);
                suggestions.appendChild(li);
              });
            }
          });
        </script>
    </main>

  <script src="headerScrollState.js"></script>
</body>
</html>
