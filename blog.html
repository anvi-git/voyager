<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" href="favicon_io/bt_logo.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=UnifrakturMaguntia&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="blog_data.js"></script>
</head>
<body>
  <div id="site-header"></div>

  <main id="main-content" class="page-wrapper">
    <div id="blog-layout">
      <section id="blog-articles"></section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const articlesContainer = document.getElementById('blog-articles');
      const suggestions = document.getElementById('suggestions-list');
      const articles = window.BLOG_ARTICLES || {};

      const ids = Object.keys(articles).sort((a, b) => {
        const da = new Date(articles[a].date || 0);
        const db = new Date(articles[b].date || 0);
        return db - da;
      });

      if (!ids.length) {
        if (articlesContainer) {
          articlesContainer.innerHTML = '<p>No posts yet.</p>';
        }
        return;
      }

      if (articlesContainer) {
        ids.forEach(id => {
          const article = articles[id] || {};
          const card = document.createElement('article');
          card.className = 'publication-small-card';
          card.innerHTML = `
            <div class="publication-small-content">
              <h3 class="publication-small-title">
                <a href="blog_article.html?id=${id}">${article.title || ''}</a>
              </h3>
              <p class="publication-small-excerpt">${article.excerpt || ''}</p>
            </div>
          `;
          articlesContainer.appendChild(card);
        });
      }

      if (suggestions) {
        ids.slice(1, 4).forEach(id => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = `blog_article.html?id=${id}`;
          a.textContent = articles[id].title || 'Untitled';
          li.appendChild(a);
          suggestions.appendChild(li);
        });
      }
    });
  </script>

  <script src="layout.js"></script>
  <script src="headerScrollState.js" defer></script>
</body>
</html>
