<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Article</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon_io/backyard_thoughts.png" type="image/x-icon">
    <script src="includeHTML.js"></script>
    <script src="post_content_data.js"></script>
    <script src="blog_data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function getArticleBody(markdownFile) {
        if (
          window.POST_CONTENTS &&
          Object.prototype.hasOwnProperty.call(window.POST_CONTENTS, markdownFile)
        ) {
          return window.POST_CONTENTS[markdownFile];
        }

        const response = await fetch(markdownFile);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
      }

      function renderArticleBody(containerId, bodyText) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const trimmed = (bodyText || '').trim();
        if (!trimmed) {
          container.innerHTML = '<p>This post has no content yet.</p>';
          return;
        }

        // Imported posts sometimes already contain HTML.
        const looksLikeHtml = /<\s*[a-z!][^>]*>/i.test(trimmed);
        if (looksLikeHtml) {
          container.innerHTML = trimmed;
          return;
        }

        if (window.marked && typeof window.marked.parse === 'function') {
          container.innerHTML = window.marked.parse(trimmed);
          return;
        }

        container.innerHTML = trimmed
          .split(/\n{2,}/)
          .map(block => `<p>${block.replace(/\n/g, '<br>')}</p>`)
          .join('');
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || '1';
        const article = window.BLOG_ARTICLES[id] || window.BLOG_ARTICLES['1'];
        document.getElementById('blog-article-title').textContent = article.title;
        document.getElementById('blog-article-date').textContent = article.date || '';

        if (article.markdownFile) {
          try {
            const mdText = await getArticleBody(article.markdownFile);
            renderArticleBody('blog-article-body', mdText);
          } catch (error) {
            document.getElementById('blog-article-body').innerHTML = '<p>Unable to load post content.</p>';
          }
        } else {
          renderArticleBody('blog-article-body', article.content || '');
        }

        // Populate Suggestions with three random posts (excluding current)
        const suggestionsUl = document.getElementById('suggestions-list');
        if (suggestionsUl) {
          const allIds = Object.keys(window.BLOG_ARTICLES).filter(k => k !== id);
          for (let i = allIds.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allIds[i], allIds[j]] = [allIds[j], allIds[i]];
          }
          allIds.slice(0, 3).forEach(randId => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = `blog_article.html?id=${randId}`;
            a.textContent = window.BLOG_ARTICLES[randId].title;
            li.appendChild(a);
            suggestionsUl.appendChild(li);
          });
        }
      });
    </script>
</head>
<body onload="includeHTML();">
    <div include-html="header.html"></div>
    <main id="blog-article">
        <div id="blog-layout">
            <article class="blog-article-container">
                <h1 id="blog-article-title"></h1>
                <p class="blog-article-meta">Published <time id="blog-article-date"></time></p>
                <section id="blog-article-body" class="blog-article-content"></section>
            </article>
            <aside id="blog-sidebar">
            </aside>
        </div>
    </main>
    <div include-html="footer.html"></div>
</body>
</html>
