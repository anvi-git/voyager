<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heralding Time Article</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon_io/backyard_thoughts.png" type="image/x-icon">
    <script src="includeHTML.js"></script>
    <script src="ht_data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || '1';
        const article = window.HT_ARTICLES[id] || window.HT_ARTICLES['1'];

        if (!article) {
          document.getElementById('ht-article-body').innerHTML = '<p>Post not found.</p>';
          return;
        }

        document.getElementById('ht-article-title').textContent = article.title;
        document.getElementById('ht-article-date').textContent = article.date || '';

        try {
          const response = await fetch(article.markdownFile);
          const mdText = await response.text();
          document.getElementById('ht-article-body').innerHTML = marked.parse(mdText);
        } catch (error) {
          document.getElementById('ht-article-body').innerHTML = '<p>Unable to load post content.</p>';
        }

        const suggestionsUl = document.getElementById('ht-suggestions-list');
        if (suggestionsUl) {
          const ids = Object.keys(window.HT_ARTICLES).sort((a, b) => {
            const da = new Date(window.HT_ARTICLES[a].date || 0);
            const db = new Date(window.HT_ARTICLES[b].date || 0);
            return db - da;
          });

          const seriesIds = ids.filter(articleId => {
            if (articleId === id) return false;
            const item = window.HT_ARTICLES[articleId] || {};
            const excerpt = (item.excerpt || '').toLowerCase();
            return excerpt.includes('on the motion of the earth') || excerpt.includes('sul moto della terra');
          });

          if (!seriesIds.length) {
            const li = document.createElement('li');
            li.textContent = 'No related posts yet.';
            suggestionsUl.appendChild(li);
          } else {
            seriesIds.forEach(seriesId => {
              const li = document.createElement('li');
              const a = document.createElement('a');
              a.href = `ht_article.html?id=${seriesId}`;
              a.textContent = window.HT_ARTICLES[seriesId].title;
              li.appendChild(a);
              suggestionsUl.appendChild(li);
            });
          }
        }
      });
    </script>
</head>
<body onload="includeHTML();">
    <div include-html="header.html"></div>
    <main id="blog-article">
        <div id="blog-layout">
            <article class="blog-article-container">
                <h1 id="ht-article-title"></h1>
                <p class="blog-article-meta">Published <time id="ht-article-date"></time></p>
                <section id="ht-article-body" class="blog-article-content"></section>
            </article>
            <aside id="blog-sidebar">
                <section>
                    <h2>read also...</h2>
                    <ul class="blog-sidebar-list" id="ht-suggestions-list"></ul>
                </section>
            </aside>
        </div>
    </main>
    <div include-html="footer.html"></div>
</body>
</html>
