<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heralding Time Article</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon_io/backyard_thoughts.png" type="image/x-icon">
    <script src="includeHTML.js"></script>
    <script src="post_content_data.js"></script>
    <script src="ht_data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function getArticleBody(markdownFile) {
        if (
          window.POST_CONTENTS &&
          Object.prototype.hasOwnProperty.call(window.POST_CONTENTS, markdownFile)
        ) {
          return window.POST_CONTENTS[markdownFile];
        }

        const response = await fetch(markdownFile);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
      }

      function showArticleError(containerId, message) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `<p>Unable to load post content. ${message}</p>`;
      }

      function plainTextLength(input) {
        return (input || '')
          .replace(/<[^>]*>/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
          .length;
      }

      function escapeHtml(input) {
        return (input || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function buildShortContentNote(article) {
        const excerpt = (article && article.excerpt) || '';
        const markdownFile = (article && article.markdownFile) || 'unknown file';
        const excerptHtml = excerpt ? `<p>${escapeHtml(excerpt)}</p>` : '';
        return `
          <div class="archive-short-content-note">
            ${excerptHtml}
            <p><em>Archive note: this local file currently contains only a short preview. Source file: ${escapeHtml(markdownFile)}.</em></p>
          </div>
        `;
      }

      function renderArticleBody(containerId, bodyText, article) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const trimmed = (bodyText || '').trim();
        if (!trimmed) {
          container.innerHTML = buildShortContentNote(article);
          return;
        }

        const plainLen = plainTextLength(trimmed);

        // Imported posts sometimes already contain HTML.
        const looksLikeHtml = /<\s*[a-z!][^>]*>/i.test(trimmed);
        const shortNote = plainLen < 120 ? buildShortContentNote(article) : '';
        if (looksLikeHtml) {
          container.innerHTML = trimmed + shortNote;
          return;
        }

        if (window.marked && typeof window.marked.parse === 'function') {
          container.innerHTML = window.marked.parse(trimmed) + shortNote;
          return;
        }

        container.innerHTML = trimmed
          .split(/\n{2,}/)
          .map(block => `<p>${block.replace(/\n/g, '<br>')}</p>`)
          .join('') + shortNote;
      }

      function removeDuplicateTitle(containerId, pageTitle) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const firstHeading = container.querySelector('h1, h2');
        if (!firstHeading) return;

        const normalize = text => (text || '').replace(/\s+/g, ' ').trim().toLowerCase();
        if (normalize(firstHeading.textContent) === normalize(pageTitle)) {
          firstHeading.remove();
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const bodyContainerId = 'ht-article-body';
        try {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || '1';
        const articles = window.HT_ARTICLES || {};
        const fallbackId = Object.keys(articles)[0];
        const article = articles[id] || articles[fallbackId];

        if (!article) {
          showArticleError(bodyContainerId, 'Post not found.');
          return;
        }

        document.getElementById('ht-article-title').textContent = article.title;
        document.getElementById('ht-article-date').textContent = article.date || '';

        try {
          const mdText = await getArticleBody(article.markdownFile);
          renderArticleBody(bodyContainerId, mdText, article);
          removeDuplicateTitle(bodyContainerId, article.title);
        } catch (error) {
          showArticleError(bodyContainerId, `File: ${article.markdownFile}.`);
        }

        const suggestionsUl = document.getElementById('ht-suggestions-list');
        if (suggestionsUl) {
          const ids = Object.keys(articles).sort((a, b) => {
            const da = new Date(articles[a].date || 0);
            const db = new Date(articles[b].date || 0);
            return db - da;
          });

          const seriesIds = ids.filter(articleId => {
            if (articleId === id) return false;
            const item = articles[articleId] || {};
            const excerpt = (item.excerpt || '').toLowerCase();
            return excerpt.includes('on the motion of the earth') || excerpt.includes('sul moto della terra');
          });

          if (!seriesIds.length) {
            const li = document.createElement('li');
            li.textContent = 'No related posts yet.';
            suggestionsUl.appendChild(li);
          } else {
            seriesIds.forEach(seriesId => {
              const li = document.createElement('li');
              const a = document.createElement('a');
              a.href = `ht_article.html?id=${seriesId}`;
              a.textContent = articles[seriesId].title;
              li.appendChild(a);
              suggestionsUl.appendChild(li);
            });
          }
        }
        } catch (error) {
          showArticleError(bodyContainerId, `Runtime error: ${error.message}`);
        }
      });
    </script>
</head>
<body onload="includeHTML();">
    <div include-html="header.html"></div>
    <main id="blog-article">
    <div id="blog-layout" class="publication-layout">
            <aside id="blog-sidebar">
                <section>
                    <h2>read also...</h2>
                    <ul class="blog-sidebar-list" id="ht-suggestions-list"></ul>
                </section>
            </aside>
      <article class="blog-article-container">
        <h1 id="ht-article-title"></h1>
        <p class="blog-article-meta">Published <time id="ht-article-date"></time></p>
        <section id="ht-article-body" class="blog-article-content"></section>
      </article>
        </div>
    </main>
    <div include-html="footer.html"></div>
</body>
</html>
