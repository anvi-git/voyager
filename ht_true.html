<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heralding Time</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon_io/bt_logo.png" type="image/x-icon">
  <script src="includeHTML.js"></script>
  <script src="ht_data.js"></script>
</head>
<body>
  <header>
    <div id="title-container">
      <a href="index.html" id="site-initials" aria-label="Backyard Thoughts home">BT</a>
      <h1 id="site-title">
        <a href="index.html" id="site-title-link" aria-label="Backyard Thoughts"><span class="site-title-full">BACKYARD THOUGHTS</span><span class="site-title-short" aria-hidden="true">BT</span></a>
      </h1>
      <a href="landing_page.html" id="menu-trigger" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </a>
    </div>
    <div class="banner">
      <section id="ht">
        <h2><a href="ht_true.html">heralding time</a></h2>
      </section>
      <section id="lss">
        <h2><a href="lss_true.html">last scattering surface</a></h2>
      </section>
      <section id="spso">
        <h2><a href="spacesound_true.html">space of sound</a></h2>
      </section>
      <section id="blog">
        <h2><a href="blog.html">the blog</a></h2>
      </section>
      <section id="about">
        <h2><a href="about.html">about</a></h2>
      </section>
    </div>
  </header>
  <main id="blog-page" class="collection-page publication-home">
    <h1>Heralding Time</h1>
    <section id="ht-featured" class="publication-featured"></section>
    <section id="ht-animation" class="publication-animation">
      <video width="100%" height="auto" autoplay muted loop>
        <source src="animations/Circle.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </section>
    <section id="ht-sections" class="publication-sections"></section>
    <section id="ht-footer-archive" class="publication-footer-section"></section>
  </main>
  <div include-html="footer.html"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const dedupeArticles = sourceArticles => {
        const scoreArticle = article => {
          const file = ((article && article.markdownFile) || '').toLowerCase();
          if (file.endsWith('.html')) return 2;
          if (file.endsWith('.md')) return 1;
          return 0;
        };

        const normalize = value => (value || '').toString().trim().toLowerCase();
        const makeKey = article => [
          normalize(article && article.title),
          normalize(article && article.date),
          normalize(article && article.excerpt)
        ].join('||');

        const bestByKey = new Map();
        const idAlias = {};

        Object.entries(sourceArticles || {}).forEach(([id, article]) => {
          const candidate = { id, article, score: scoreArticle(article) };
          const key = makeKey(article);
          const existing = bestByKey.get(key);

          if (!existing) {
            bestByKey.set(key, candidate);
            return;
          }

          const keepCandidate = candidate.score > existing.score;
          if (keepCandidate) {
            idAlias[existing.id] = candidate.id;
            bestByKey.set(key, candidate);
          } else {
            idAlias[candidate.id] = existing.id;
          }
        });

        const articles = {};
        bestByKey.forEach(entry => {
          articles[entry.id] = entry.article;
        });

        return { articles, idAlias };
      };

      const detectLanguage = article => {
        const text = `${article.title || ''} ${article.excerpt || ''}`.toLowerCase();
        const italianHints = [' sul ', ' della ', ' degli ', ' gli ', ' una ', ' questo ', ' capitolo ', ' il ', ' la ', ' di ', ' e '];
        const score = italianHints.reduce((acc, hint) => acc + (text.includes(hint) ? 1 : 0), 0);
        return score >= 2 ? 'it' : 'en';
      };

      const createSectionBlock = (title, items, buildHref) => {
        const pageSize = 8;
        let page = 0;
        const totalPages = Math.max(1, Math.ceil(items.length / pageSize));

        const block = document.createElement('section');
        block.className = 'publication-section-block';
        block.innerHTML = `
          <h2 class="publication-section-title">${title}</h2>
          <div class="publication-section-rail"></div>
          <div class="publication-section-controls">
            <button class="publication-section-nav prev" type="button" aria-label="Show previous posts">Previous</button>
            <span class="publication-section-page"></span>
            <button class="publication-section-nav next" type="button" aria-label="Show next posts">Next</button>
          </div>
        `;

        const rail = block.querySelector('.publication-section-rail');
        const prev = block.querySelector('.publication-section-nav.prev');
        const next = block.querySelector('.publication-section-nav.next');
        const pageLabel = block.querySelector('.publication-section-page');

        const renderPage = () => {
          rail.innerHTML = '';
          const start = page * pageSize;
          const pageItems = items.slice(start, start + pageSize);

          pageItems.forEach(({ id, article }) => {
            const card = document.createElement('a');
            card.className = 'publication-small-card';
            card.href = buildHref(id);

            const imageMarkup = article.image
              ? `<img src="${article.image}" alt="${article.title}" class="publication-small-image">`
              : '<div class="publication-small-image publication-small-image-empty" aria-hidden="true"></div>';

            card.innerHTML = `
              ${imageMarkup}
              <div class="publication-small-content">
                <h3 class="publication-small-title">${article.title}</h3>
                <p class="publication-small-excerpt">${article.excerpt || ''}</p>
              </div>
            `;
            rail.appendChild(card);
          });

          prev.disabled = page <= 0;
          next.disabled = page >= totalPages - 1;
          if (pageLabel) pageLabel.textContent = `${page + 1} / ${totalPages}`;
        };

        prev.addEventListener('click', () => {
          if (page <= 0) return;
          page -= 1;
          renderPage();
        });

        next.addEventListener('click', () => {
          if (page >= totalPages - 1) return;
          page += 1;
          renderPage();
        });

        if (totalPages <= 1) {
          prev.style.visibility = 'hidden';
          next.style.visibility = 'hidden';
        }

        renderPage();

        return block;
      };

      const sectionsContainer = document.getElementById('ht-sections');
      const featured = document.getElementById('ht-featured');
      const footerArchive = document.getElementById('ht-footer-archive');
      const deduped = dedupeArticles(window.HT_ARTICLES || {});
      const articles = deduped.articles;
      const ids = Object.keys(articles).sort((a, b) => {
        const da = new Date(articles[a].date || 0);
        const db = new Date(articles[b].date || 0);
        return db - da;
      });

      if (!ids.length) {
        featured.innerHTML = '<p>No posts yet.</p>';
        return;
      }

      const [latestId] = ids;
      const latest = articles[latestId];
      const welcomeId = ids.find(id => ((articles[id].title || '').toLowerCase() === 'welcome to heralding time'));
      const welcomeArticle = welcomeId ? articles[welcomeId] : null;

      featured.innerHTML = `
        <a class="publication-featured-card" href="ht_article.html?id=${latestId}">
          ${latest.image ? `<img src="${latest.image}" alt="${latest.title}" class="publication-featured-image">` : '<div class="publication-featured-image publication-featured-image-empty"></div>'}
          <div class="publication-featured-content">
            <p class="publication-featured-meta">Latest</p>
            <h2 class="publication-featured-title">${latest.title}</h2>
            <p class="publication-featured-excerpt">${latest.excerpt || ''}</p>
            <p class="publication-featured-date">${latest.date || ''}</p>
          </div>
        </a>
      `;

      const sections = [
        {
          key: 'atomos',
          title: 'atomos',
          match: article => (article.title || '').toLowerCase().includes('atomos'),
          splitByLanguage: true,
          splitLabels: {
            en: 'atomos ',
            it: 'atomos '
          }
        },
        {
          key: 'motion_en',
          title: 'on the motion of the earth',
          match: article => {
            const excerpt = (article.excerpt || '').toLowerCase();
            return excerpt.includes('on the motion of the earth');
          }
        },
        {
          key: 'essays',
          title: 'essay',
          match: article => {
            const excerpt = (article.excerpt || '').toLowerCase();
            const title = (article.title || '').toLowerCase();
            return !title.includes('atomos')
              && !excerpt.includes('on the motion of the earth')
              && !excerpt.includes('sul moto della terra');
          }
        },
        {
          key: 'motion_it',
          title: 'sul moto della terra',
          match: article => {
            const excerpt = (article.excerpt || '').toLowerCase();
            return excerpt.includes('sul moto della terra');
          }
        }
      ];

      const sectionBuckets = new Map();
      sections.forEach(section => sectionBuckets.set(section.key, []));

      ids.forEach(id => {
        if (id === welcomeId) return;
        const article = articles[id];
        const matched = sections.find(section => section.match(article));
        if (matched) sectionBuckets.get(matched.key).push({ id, article });
      });

      sections.forEach(section => {
        const items = sectionBuckets.get(section.key) || [];
        if (!items.length) return;

        const byLanguage = { en: [], it: [] };
        items.forEach(item => {
          byLanguage[detectLanguage(item.article)].push(item);
        });

        if (section.splitByLanguage || section.splitLabels) {
          const hasEn = byLanguage.en.length > 0;
          const hasIt = byLanguage.it.length > 0;

          if (hasEn) {
            const title = (section.splitLabels && section.splitLabels.en) || `${section.title} (english)`;
            sectionsContainer.appendChild(createSectionBlock(title, byLanguage.en, id => `ht_article.html?id=${id}`));
          }

          if (hasIt) {
            const title = (section.splitLabels && section.splitLabels.it) || `${section.title} (italiano)`;
            sectionsContainer.appendChild(createSectionBlock(title, byLanguage.it, id => `ht_article.html?id=${id}`));
          }

          return;
        }

        sectionsContainer.appendChild(createSectionBlock(section.title, items, id => `ht_article.html?id=${id}`));
      });

      if (welcomeArticle && footerArchive) {
        footerArchive.innerHTML = `
          <h2 class="publication-section-title">from the archive</h2>
          <div class="publication-section-rail">
            <a class="publication-small-card" href="ht_article.html?id=${welcomeId}">
              ${welcomeArticle.image
                ? `<img src="${welcomeArticle.image}" alt="${welcomeArticle.title}" class="publication-small-image">`
                : '<div class="publication-small-image publication-small-image-empty" aria-hidden="true"></div>'}
              <div class="publication-small-content">
                <h3 class="publication-small-title">${welcomeArticle.title}</h3>
                <p class="publication-small-excerpt">${welcomeArticle.excerpt || ''}</p>
              </div>
            </a>
          </div>
        `;
      }
    });
  </script>
  <script src="headerScrollState.js"></script>
</body>
</html>
