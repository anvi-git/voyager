<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heralding Time</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon_io/backyard_thoughts.png" type="image/x-icon">
  <script src="includeHTML.js"></script>
  <script src="ht_data.js"></script>
</head>
<body onload="includeHTML();">
  <div include-html="header.html"></div>
  <main id="blog-page" class="collection-page">
    <h1>Heralding Time</h1>
    <div id="blog-layout">
      <section id="ht-articles"></section>
      <aside id="blog-sidebar">
        <section>
          <h2>read also...</h2>
          <ul class="blog-sidebar-list" id="ht-readalso-list"></ul>
        </section>
      </aside>
    </div>
  </main>
  <div include-html="footer.html"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('ht-articles');
      const readAlsoList = document.getElementById('ht-readalso-list');
      const ids = Object.keys(window.HT_ARTICLES || {}).sort((a, b) => {
        const da = new Date(window.HT_ARTICLES[a].date || 0);
        const db = new Date(window.HT_ARTICLES[b].date || 0);
        return db - da;
      });

      if (!ids.length) {
        container.innerHTML = '<p>No posts yet.</p>';
        return;
      }

      ids.forEach(id => {
        const article = window.HT_ARTICLES[id];
        const card = document.createElement('a');
        card.className = 'collection-card';
        card.href = `ht_article.html?id=${id}`;

        const imageMarkup = article.image
          ? `<img src="${article.image}" alt="${article.title}" class="collection-card-image">`
          : '';

        card.innerHTML = `
          ${imageMarkup}
          <div class="collection-card-content">
            <h2 class="collection-card-title">${article.title}</h2>
            <p class="collection-card-meta">${article.date || ''}</p>
            <p class="collection-card-excerpt">${article.excerpt || ''}</p>
          </div>
        `;
        container.appendChild(card);
      });

      if (readAlsoList) {
        const seriesIds = ids.filter(id => {
          const article = window.HT_ARTICLES[id] || {};
          const excerpt = (article.excerpt || '').toLowerCase();
          return excerpt.includes('on the motion of the earth') || excerpt.includes('sul moto della terra');
        });

        if (!seriesIds.length) {
          const li = document.createElement('li');
          li.textContent = 'No related posts yet.';
          readAlsoList.appendChild(li);
          return;
        }

        seriesIds.forEach(id => {
          const article = window.HT_ARTICLES[id];
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = `ht_article.html?id=${id}`;
          a.textContent = article.title;
          li.appendChild(a);
          readAlsoList.appendChild(li);
        });
      }
    });
  </script>
</body>
</html>
