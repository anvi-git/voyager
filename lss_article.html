<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Scattering Surface Article</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon_io/bt_logo.png" type="image/x-icon">
  <script src="lss_data.js"></script>
  <script src="post_content_data.js"></script>
  <script src="article_content_sanitizer.js"></script>
    <script>
      async function getArticleBody(markdownFile) {
        if (
          window.POST_CONTENTS &&
          Object.prototype.hasOwnProperty.call(window.POST_CONTENTS, markdownFile)
        ) {
          return window.POST_CONTENTS[markdownFile];
        }

        const response = await fetch(markdownFile);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
      }

      function showArticleError(containerId, message) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `<p>Unable to load post content. ${message}</p>`;
      }

      function plainTextLength(input) {
        return (input || '')
          .replace(/<[^>]*>/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
          .length;
      }

      function escapeHtml(input) {
        return (input || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function buildShortContentNote(article) {
        const excerpt = (article && article.excerpt) || '';
        const markdownFile = (article && article.markdownFile) || 'unknown file';
        const excerptHtml = excerpt ? `<p>${escapeHtml(excerpt)}</p>` : '';
        return `
          <div class="archive-short-content-note">
            ${excerptHtml}
            <p><em>Archive note: this local file currently contains only a short preview. Source file: ${escapeHtml(markdownFile)}.</em></p>
          </div>
        `;
      }

      function renderArticleBody(containerId, bodyText, article) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const trimmed = (bodyText || '').trim();
        if (!trimmed) {
          container.innerHTML = buildShortContentNote(article);
          return;
        }

        const plainLen = plainTextLength(trimmed);

        // Imported posts sometimes already contain HTML.
        const looksLikeHtml = /<\s*[a-z!][^>]*>/i.test(trimmed);
        const shortNote = plainLen < 120 ? buildShortContentNote(article) : '';
        let renderedHtml = '';

        if (looksLikeHtml) {
          renderedHtml = trimmed;
        } else if (window.marked && typeof window.marked.parse === 'function') {
          renderedHtml = window.marked.parse(trimmed);
        } else {
          renderedHtml = trimmed
            .split(/\n{2,}/)
            .map(block => `<p>${block.replace(/\n/g, '<br>')}</p>`)
            .join('');
        }

        const sanitizer = window.sanitizeImportedArticleHtml;
        const sanitizedHtml = typeof sanitizer === 'function'
          ? sanitizer(renderedHtml)
          : renderedHtml;

        if (!plainTextLength(sanitizedHtml)) {
          container.innerHTML = buildShortContentNote(article);
          return;
        }

        container.innerHTML = sanitizedHtml + shortNote;
      }

      function removeDuplicateTitle(containerId, pageTitle) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const firstHeading = container.querySelector('h1, h2');
        if (!firstHeading) return;

        const normalize = text => (text || '').replace(/\s+/g, ' ').trim().toLowerCase();
        if (normalize(firstHeading.textContent) === normalize(pageTitle)) {
          firstHeading.remove();
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const bodyContainerId = 'lss-article-body';
        try {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || '1';
        const articles = window.LSS_ARTICLES || {};
        const fallbackId = Object.keys(articles)[0];
        const article = articles[id] || articles[fallbackId];

        if (!article) {
          showArticleError(bodyContainerId, 'Post not found.');
          return;
        }

        document.getElementById('lss-article-title').textContent = article.title;
        document.getElementById('lss-article-date').textContent = article.date || '';

        try {
          const mdText = await getArticleBody(article.markdownFile);
          renderArticleBody(bodyContainerId, mdText, article);
          removeDuplicateTitle(bodyContainerId, article.title);
        } catch (error) {
          showArticleError(bodyContainerId, `File: ${article.markdownFile}.`);
        }

        const suggestionsUl = document.getElementById('lss-suggestions-list');
        if (suggestionsUl) {
          const allIds = Object.keys(articles).sort((a, b) => {
            const da = new Date(articles[a].date || 0);
            const db = new Date(articles[b].date || 0);
            return db - da;
          });

          allIds.slice(0, 12).forEach(randId => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = `lss_article.html?id=${randId}`;
            a.textContent = articles[randId].title;
            li.appendChild(a);
            suggestionsUl.appendChild(li);
          });
        }
        } catch (error) {
          showArticleError(bodyContainerId, `Runtime error: ${error.message}`);
        }
      });
    </script>
</head>
<body>

        <section id="lss">
