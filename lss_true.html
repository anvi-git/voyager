<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Scattering Surface</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon_io/backyard_thoughts.png" type="image/x-icon">
  <script src="includeHTML.js"></script>
  <script src="lss_data.js"></script>
</head>
<body onload="includeHTML();">
  <div include-html="header.html"></div>
  <main id="blog-page" class="collection-page">
    <h1>Last Scattering Surface</h1>
    <p class="collection-intro">Posts on cosmology and astrophysics, hosted directly on Backyard Thoughts.</p>
    <section id="lss-articles"></section>
  </main>
  <div include-html="footer.html"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('lss-articles');
      const ids = Object.keys(window.LSS_ARTICLES || {}).sort((a, b) => {
        const da = new Date(window.LSS_ARTICLES[a].date || 0);
        const db = new Date(window.LSS_ARTICLES[b].date || 0);
        return db - da;
      });

      if (!ids.length) {
        container.innerHTML = '<p>No posts yet.</p>';
        return;
      }

      ids.forEach(id => {
        const article = window.LSS_ARTICLES[id];
        const card = document.createElement('a');
        card.className = 'collection-card';
        card.href = `lss_article.html?id=${id}`;

        const imageMarkup = article.image
          ? `<img src="${article.image}" alt="${article.title}" class="collection-card-image">`
          : '';

        card.innerHTML = `
          ${imageMarkup}
          <div class="collection-card-content">
            <h2 class="collection-card-title">${article.title}</h2>
            <p class="collection-card-meta">${article.date || ''}</p>
            <p class="collection-card-excerpt">${article.excerpt || ''}</p>
          </div>
        `;
        container.appendChild(card);
      });
    });
  </script>
</body>
</html>
