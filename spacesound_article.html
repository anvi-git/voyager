<head>

  <script src="spacesound_data.js"></script>
  <script src="post_content_data.js"></script>
  <script src="article_content_sanitizer.js"></script>
    <script>
      async function getArticleBody(markdownFile) {
        if (
          window.POST_CONTENTS &&
          Object.prototype.hasOwnProperty.call(window.POST_CONTENTS, markdownFile)
        ) {
          return window.POST_CONTENTS[markdownFile];
        }

        const response = await fetch(markdownFile);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
      }

      function showArticleError(containerId, message) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `<p>Unable to load post content. ${message}</p>`;
      }

      function plainTextLength(input) {
        return (input || '')
          .replace(/<[^>]*>/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
          .length;
      }

      function escapeHtml(input) {
        return (input || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function buildShortContentNote(article) {
        const excerpt = (article && article.excerpt) || '';
        const markdownFile = (article && article.markdownFile) || 'unknown file';
        const excerptHtml = excerpt ? `<p>${escapeHtml(excerpt)}</p>` : '';
        return `
          <div class="archive-short-content-note">
            ${excerptHtml}
            <p><em>Archive note: this local file currently contains only a short preview. Source file: ${escapeHtml(markdownFile)}.</em></p>
          </div>
        `;
      }

      function renderArticleBody(containerId, bodyText, article) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const trimmed = (bodyText || '').trim();
        if (!trimmed) {
          container.innerHTML = buildShortContentNote(article);
          return;
        }

        const plainLen = plainTextLength(trimmed);

        // Imported posts sometimes already contain HTML.
        const looksLikeHtml = /<\s*[a-z!][^>]*>/i.test(trimmed);
        const shortNote = plainLen < 120 ? buildShortContentNote(article) : '';
        let renderedHtml = '';

        if (looksLikeHtml) {
          renderedHtml = trimmed;
        } else if (window.marked && typeof window.marked.parse === 'function') {
          renderedHtml = window.marked.parse(trimmed);
        } else {
          renderedHtml = trimmed
            .split(/\n{2,}/)
            .map(block => {
              const escaped = escapeHtml(block);
              const withImages = escaped.replace(
                /!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
                (_m, alt, src, title) => `<img src="${src}" alt="${alt}"${title ? ` title="${title}"` : ''} loading="lazy">`
              );
              return `<p>${withImages.replace(/\n/g, '<br>')}</p>`;
            })
            .join('');
        }

        const sanitizer = window.sanitizeImportedArticleHtml;
        const sanitizedHtml = typeof sanitizer === 'function'
          ? sanitizer(renderedHtml)
          : renderedHtml;

        if (!plainTextLength(sanitizedHtml)) {
          container.innerHTML = buildShortContentNote(article);
          return;
        }

        container.innerHTML = sanitizedHtml + shortNote;
      }

      function removeDuplicateTitle(containerId, pageTitle) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const firstHeading = container.querySelector('h1, h2');
        if (!firstHeading) return;

        const normalize = text => (text || '').replace(/\s+/g, ' ').trim().toLowerCase();
        if (normalize(firstHeading.textContent) === normalize(pageTitle)) {
          firstHeading.remove();
        }
      }

      function isSoundOrbitsArticle(article) {
        const title = ((article && article.title) || '').toLowerCase();
        return title.includes('sound orbits');
      }

      function textOfNode(node) {
        return ((node && node.textContent) || '').replace(/\s+/g, ' ').trim();
      }

      function isParagraphNode(node) {
        return node && node.tagName === 'P';
      }

      function isSongTitleParagraph(node) {
        if (!isParagraphNode(node)) return false;
        const text = textOfNode(node);
        if (!text || !text.includes(':')) return false;

        const lower = text.toLowerCase();
        if (lower.startsWith('this week')) return false;
        if (lower.startsWith('delayed orbit')) return false;
        if (lower.startsWith('produced by:')) return false;
        if (lower.startsWith('published by:')) return false;
        if (lower.startsWith('published:')) return false;
        if (lower.startsWith('label -')) return false;
        if (lower.startsWith('label:')) return false;
        if (lower.startsWith('here the piece')) return false;

        return true;
      }

      function isDividerParagraph(node) {
        if (!isParagraphNode(node)) return false;
        const text = textOfNode(node).toLowerCase();
        return text.startsWith('this week') || text.startsWith('delayed orbit') || text === ':';
      }

      function isOutroParagraph(node) {
        if (!isParagraphNode(node)) return false;
        return textOfNode(node).toLowerCase() === 'see you next time.';
      }

      function isLinksParagraph(node) {
        if (!isParagraphNode(node)) return false;
        const text = textOfNode(node).toLowerCase();
        if (!text) return false;

        const looksLikePlatformList =
          text.includes('youtube') ||
          text.includes('spotify') ||
          text.includes('apple music') ||
          text.includes('bandcamp') ||
          text.includes('on the web') ||
          text.includes('website');

        return looksLikePlatformList;
      }

      function extractUrls(text) {
        return (text.match(/https?:\/\/[^\s<)]+/gi) || []).map(url => url.replace(/[.,;:!?]+$/, ''));
      }

      function createLinksContent(linkNodes) {
        const linksWrap = document.createElement('div');
        linksWrap.className = 'sound-orbit-links';
        if (!linkNodes.length) return linksWrap;

        const urls = [];
        linkNodes.forEach(node => {
          extractUrls(textOfNode(node)).forEach(url => urls.push(url));
        });

        if (urls.length) {
          const linksList = document.createElement('div');
          linksList.className = 'sound-orbit-links-list';
          urls.forEach(url => {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = url;
            linksList.appendChild(a);
          });
          linksWrap.appendChild(linksList);
        } else {
          linkNodes.forEach(node => {
            const p = document.createElement('p');
            p.textContent = textOfNode(node);
            linksWrap.appendChild(p);
          });
        }

        return linksWrap;
      }

      function createEmbedsContent(linkNodes) {
        const embedsWrap = document.createElement('div');
        embedsWrap.className = 'sound-orbit-embeds';

        const youtubeUrls = [];
        linkNodes.forEach(node => {
          extractUrls(textOfNode(node)).forEach(url => {
            if (url.includes('youtube.com/watch?v=')) {
              youtubeUrls.push(url);
            } else if (url.includes('youtu.be/')) {
              youtubeUrls.push(url);
            }
          });
        });

        youtubeUrls.forEach(url => {
          let videoId = '';
          const longMatch = url.match(/[?&]v=([^&]+)/);
          const shortMatch = url.match(/youtu\.be\/([^?&]+)/);

          if (longMatch && longMatch[1]) videoId = longMatch[1];
          if (!videoId && shortMatch && shortMatch[1]) videoId = shortMatch[1];
          if (!videoId) return;

          const iframe = document.createElement('iframe');
          iframe.src = `https://www.youtube.com/embed/${encodeURIComponent(videoId)}`;
          iframe.title = 'YouTube video player';
          iframe.loading = 'lazy';
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
          iframe.referrerPolicy = 'strict-origin-when-cross-origin';
          iframe.allowFullscreen = true;
          embedsWrap.appendChild(iframe);
        });

        return embedsWrap;
      }

      function buildSongCard(songTitleNode, songNodes) {
        const card = document.createElement('article');
        card.className = 'sound-orbit-song';

        const top = document.createElement('div');
        top.className = 'sound-orbit-song-top';

        const description = document.createElement('div');
        description.className = 'sound-orbit-description';

        const title = document.createElement('h3');
        title.className = 'sound-orbit-song-title';
        title.textContent = textOfNode(songTitleNode);
        description.appendChild(title);

        let coverNode = null;
        const linkNodes = [];

        songNodes.forEach(node => {
          if (!coverNode && node.tagName === 'FIGURE') {
            coverNode = node.cloneNode(true);
            coverNode.classList.add('sound-orbit-cover');
            return;
          }

          if (isLinksParagraph(node)) {
            linkNodes.push(node);
            return;
          }

          if (node.tagName === 'P') {
            const p = document.createElement('p');
            p.textContent = textOfNode(node);
            description.appendChild(p);
          }
        });

        if (coverNode) {
          top.appendChild(coverNode);
        }
        top.appendChild(description);
        card.appendChild(top);

        const links = createLinksContent(linkNodes);
        if (links.childNodes.length) card.appendChild(links);

        const embeds = createEmbedsContent(linkNodes);
        if (embeds.childNodes.length) card.appendChild(embeds);

        return card;
      }

      function formatSoundOrbitsBody(containerId, article) {
        if (!isSoundOrbitsArticle(article)) return;

        const container = document.getElementById(containerId);
        if (!container) return;

        const nodes = Array.from(container.children);
        if (!nodes.length) return;

        const firstSongIndex = nodes.findIndex(isSongTitleParagraph);
        if (firstSongIndex === -1) return;

        const fragment = document.createDocumentFragment();

        nodes.slice(0, firstSongIndex).forEach(node => {
          fragment.appendChild(node.cloneNode(true));
        });

        for (let i = firstSongIndex; i < nodes.length; i++) {
          const node = nodes[i];

          if (isSongTitleParagraph(node)) {
            const songNodes = [];
            let cursor = i + 1;
            while (cursor < nodes.length) {
              const nextNode = nodes[cursor];
              if (isSongTitleParagraph(nextNode) || isDividerParagraph(nextNode) || isOutroParagraph(nextNode)) break;
              songNodes.push(nextNode);
              cursor += 1;
            }

            fragment.appendChild(buildSongCard(node, songNodes));
            i = cursor - 1;
            continue;
          }

          if (isDividerParagraph(node) || isOutroParagraph(node)) {
            const divider = document.createElement('p');
            divider.className = 'sound-orbit-divider';
            divider.textContent = textOfNode(node);
            fragment.appendChild(divider);
            continue;
          }

          fragment.appendChild(node.cloneNode(true));
        }

        container.innerHTML = '';
        container.classList.add('sound-orbits-layout');
        container.appendChild(fragment);
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const bodyContainerId = 'spacesound-article-body';
        try {
        const dedupeArticles = sourceArticles => {
          const scoreArticle = article => {
            const file = ((article && article.markdownFile) || '').toLowerCase();
            if (file.endsWith('.html')) return 2;
            if (file.endsWith('.md')) return 1;
            return 0;
          };

          const normalize = value => (value || '').toString().trim().toLowerCase();
          const makeKey = article => [
            normalize(article && article.title),
            normalize(article && article.date),
            normalize(article && article.excerpt)
          ].join('||');

          const bestByKey = new Map();
          const idAlias = {};

          Object.entries(sourceArticles || {}).forEach(([articleId, article]) => {
            const candidate = { id: articleId, article, score: scoreArticle(article) };
            const key = makeKey(article);
            const existing = bestByKey.get(key);

            if (!existing) {
              bestByKey.set(key, candidate);
              return;
            }

            if (candidate.score > existing.score) {
              idAlias[existing.id] = candidate.id;
              bestByKey.set(key, candidate);
            } else {
              idAlias[candidate.id] = existing.id;
            }
          });

          const articles = {};
          bestByKey.forEach(entry => {
            articles[entry.id] = entry.article;
          });

          return { articles, idAlias };
        };

        const getArticleSlug = article => {
          const markdownFile = ((article && article.markdownFile) || '').toString();
          const filename = markdownFile.split('/').pop() || '';
          return filename.replace(/\.(md|html)$/i, '');
        };

        const buildArticleHref = article => {
          const slug = getArticleSlug(article);
          return slug ? `spacesound_article.html?article=${encodeURIComponent(slug)}` : 'spacesound_article.html';
        };

        const params = new URLSearchParams(window.location.search);
        const requestedArticleSlug = params.get('article');
        const requestedId = params.get('id') || '1';
        const deduped = dedupeArticles(window.SPACESOUND_ARTICLES || {});
        const articles = deduped.articles;
        const idBySlug = {};
        Object.keys(articles).forEach(articleId => {
          const slug = getArticleSlug(articles[articleId]);
          if (slug) idBySlug[slug] = articleId;
        });

        const idFromSlug = requestedArticleSlug ? idBySlug[requestedArticleSlug] : null;
        const id = idFromSlug || deduped.idAlias[requestedId] || requestedId;
        const fallbackId = Object.keys(articles)[0];
        const article = articles[id] || articles[fallbackId];

        if (!article) {
          showArticleError(bodyContainerId, 'Post not found.');
          return;
        }

        document.getElementById('spacesound-article-title').textContent = article.title;
        document.getElementById('spacesound-article-date').textContent = article.date || '';

        try {
          const mdText = await getArticleBody(article.markdownFile);
          renderArticleBody(bodyContainerId, mdText, article);
          removeDuplicateTitle(bodyContainerId, article.title);
          formatSoundOrbitsBody(bodyContainerId, article);
        } catch (error) {
          showArticleError(bodyContainerId, `File: ${article.markdownFile}.`);
        }

        const suggestionsUl = document.getElementById('spacesound-suggestions-list');
        if (suggestionsUl) {
          const allIds = Object.keys(articles).sort((a, b) => {
            const da = new Date(articles[a].date || 0);
            const db = new Date(articles[b].date || 0);
            return db - da;
          });

          allIds.slice(0, 12).forEach(randId => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = buildArticleHref(articles[randId]);
            a.textContent = articles[randId].title;
            li.appendChild(a);
            suggestionsUl.appendChild(li);
          });
        }
        } catch (error) {
          showArticleError(bodyContainerId, `Runtime error: ${error.message}`);
        }
      });
    </script>
