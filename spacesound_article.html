<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space of Sound Article</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon_io/backyard_thoughts.png" type="image/x-icon">
    <script src="includeHTML.js"></script>
    <script src="post_content_data.js"></script>
    <script src="spacesound_data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function getArticleBody(markdownFile) {
        if (
          window.POST_CONTENTS &&
          Object.prototype.hasOwnProperty.call(window.POST_CONTENTS, markdownFile)
        ) {
          return window.POST_CONTENTS[markdownFile];
        }

        const response = await fetch(markdownFile);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
      }

      function renderArticleBody(containerId, bodyText) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const trimmed = (bodyText || '').trim();
        if (!trimmed) {
          container.innerHTML = '<p>This post has no content yet.</p>';
          return;
        }

        // Imported posts sometimes already contain HTML.
        const looksLikeHtml = /<\s*[a-z!][^>]*>/i.test(trimmed);
        if (looksLikeHtml) {
          container.innerHTML = trimmed;
          return;
        }

        if (window.marked && typeof window.marked.parse === 'function') {
          container.innerHTML = window.marked.parse(trimmed);
          return;
        }

        container.innerHTML = trimmed
          .split(/\n{2,}/)
          .map(block => `<p>${block.replace(/\n/g, '<br>')}</p>`)
          .join('');
      }

      function removeDuplicateTitle(containerId, pageTitle) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const firstHeading = container.querySelector('h1, h2');
        if (!firstHeading) return;

        const normalize = text => (text || '').replace(/\s+/g, ' ').trim().toLowerCase();
        if (normalize(firstHeading.textContent) === normalize(pageTitle)) {
          firstHeading.remove();
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || '1';
        const article = window.SPACESOUND_ARTICLES[id] || window.SPACESOUND_ARTICLES['1'];

        if (!article) {
          document.getElementById('spacesound-article-body').innerHTML = '<p>Post not found.</p>';
          return;
        }

        document.getElementById('spacesound-article-title').textContent = article.title;
        document.getElementById('spacesound-article-date').textContent = article.date || '';

        try {
          const mdText = await getArticleBody(article.markdownFile);
          renderArticleBody('spacesound-article-body', mdText);
          removeDuplicateTitle('spacesound-article-body', article.title);
        } catch (error) {
          document.getElementById('spacesound-article-body').innerHTML = '<p>Unable to load post content.</p>';
        }

        const suggestionsUl = document.getElementById('spacesound-suggestions-list');
        if (suggestionsUl) {
          const allIds = Object.keys(window.SPACESOUND_ARTICLES).sort((a, b) => {
            const da = new Date(window.SPACESOUND_ARTICLES[a].date || 0);
            const db = new Date(window.SPACESOUND_ARTICLES[b].date || 0);
            return db - da;
          });

          allIds.slice(0, 12).forEach(randId => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = `spacesound_article.html?id=${randId}`;
            a.textContent = window.SPACESOUND_ARTICLES[randId].title;
            li.appendChild(a);
            suggestionsUl.appendChild(li);
          });
        }
      });
    </script>
</head>
<body onload="includeHTML();">
    <div include-html="header.html"></div>
    <main id="blog-article">
      <div id="blog-layout" class="publication-layout">
            <aside id="blog-sidebar">
                <section>
                    <h2>read also...</h2>
                    <ul class="blog-sidebar-list" id="spacesound-suggestions-list"></ul>
                </section>
            </aside>
        <article class="blog-article-container">
          <h1 id="spacesound-article-title"></h1>
          <p class="blog-article-meta">Published <time id="spacesound-article-date"></time></p>
          <section id="spacesound-article-body" class="blog-article-content"></section>
        </article>
        </div>
    </main>
    <div include-html="footer.html"></div>
</body>
</html>
